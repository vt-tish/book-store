<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; -webkit-font-smoothing: antialiased;">
<div style="max-width: 480px; margin: 0 auto;">

    <h2 style="font-size: 20px; font-weight: 600; margin: 0 0 16px 0;">Reset Password</h2>

    <p style="font-size: 15px; color: #333333; margin: 0 0 32px 0; line-height: 1.6;">
        A password reset was requested for your account. Click below to choose a new password.
    </p>

    <a th:href="${resetLink}" style="display: inline-block; padding: 12px 24px; background-color: #000000; color: #ffffff; text-decoration: none; font-size: 14px; font-weight: 500;">
        Reset Password
    </a>

    <p style="font-size: 13px; color: #666666; margin: 40px 0 0 0; line-height: 1.5;">
        Or paste this link into your browser:<br>
        <a th:href="${resetLink}" style="color: #000000; text-decoration: underline; word-break: break-all;" th:text="${resetLink}"></a>
    </p>

    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eeeeee;">
        <p style="font-size: 12px; color: #999999; margin: 0;">
            If you didn't request this, your account is safe and you can ignore this email.
        </p>
    </div>
</div>
</body>
</html>
