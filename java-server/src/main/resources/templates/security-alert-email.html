<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Alert</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; color: #000000; margin: 0; padding: 40px 20px; -webkit-font-smoothing: antialiased;">
<div style="max-width: 480px; margin: 0 auto;">

    <h2 style="font-size: 20px; font-weight: 600; margin: 0 0 16px 0; color: #d93025;">Security Alert</h2>

    <p style="font-size: 15px; color: #333333; margin: 0 0 24px 0; line-height: 1.6;">
        We detected unusual activity on your Bookstore account. To protect your data, <b>all active sessions have been terminated.</b>
    </p>

    <p style="font-size: 15px; color: #333333; margin: 0 0 32px 0; line-height: 1.6;">
        You will need to log in again. If you did not cause this activity, please reset your password immediately.
    </p>

    <div style="margin-top: 40px; padding-top: 20px; border-top: 1px solid #eeeeee;">
        <p style="font-size: 12px; color: #999999; margin: 0;">
            Automated security notice.
        </p>
    </div>
</div>
</body>
</html>
