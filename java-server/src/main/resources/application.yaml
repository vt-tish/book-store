spring:
  profiles:
    active: dev
  application:
    name: book-store
    security:
      jwt:
        refresh-token:
          expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS}
          grace-period-ms: ${JWT_REFRESH_TOKEN_GRACE_PERIOD_MS}
          cleanup-cron: ${JWT_CLEANUP_CRON}
        access-token:
          expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS}
          secret-key: ${JWT_SECRET}

---

spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:${H2_DB_NAME:dev-db}
    driver-class-name: org.h2.Driver
    username: ${H2_USERNAME:sa}
    password: ${H2_PASSWORD:}

  h2:
    console:
      enabled: true
      path: ${H2_CONSOLE_PATH:/h2-console}
      settings:
        web-allow-others: true

  flyway:
    locations: classpath:db/migrations, classpath:db/testdata

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: validate

  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true
