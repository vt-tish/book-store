spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:h2:mem:dev-db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  flyway:
    locations: classpath:db/migrations, classpath:db/testdata
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: validate
  springdoc:
    api-docs:
      enabled: true
    swagger-ui:
      enabled: true

book-store:
  security:
    cookie:
      secure: false
  features:
    enable-dev-tools: true
