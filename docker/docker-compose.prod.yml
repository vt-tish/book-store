services:
  book-store-server:
    container_name: book-store-server
    image: book-store-server:prod
    build:
      context: ..
      dockerfile: java-server/Dockerfile
    env_file:
      - ../environments/.env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      book-store-db:
        condition: service_healthy
    restart: always

  book-store-db:
    container_name: book-store-db
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres_data:
